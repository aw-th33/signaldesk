name: Signal Desk Engine

on:
  schedule:
    - cron: "0 */4 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore previous state
        uses: actions/cache/restore@v4
        id: state-cache
        with:
          path: state.json
          key: apex-state-${{ github.run_number }}
          restore-keys: apex-state-

      - name: Run pipeline
        run: python scripts/orchestrator.py

      - name: Save state for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            state.json
            latest_signals.json
          key: apex-state-${{ github.run_number }}

  daily-snapshot:
    runs-on: ubuntu-latest
    needs: run
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 9')
    timeout-minutes: 5
    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore signal state
        uses: actions/cache/restore@v4
        with:
          path: |
            state.json
            latest_signals.json
          key: apex-state-${{ github.run_number }}
          restore-keys: apex-state-

      - name: Run daily snapshot
        run: python scripts/daily_snapshot.py

      - name: Commit RSS feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landing/rss.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update RSS feed"
            git push
          fi

  build-landing:
    runs-on: ubuntu-latest
    needs: run
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore signal state
        uses: actions/cache/restore@v4
        with:
          path: |
            state.json
            latest_signals.json
          key: apex-state-${{ github.run_number }}
          restore-keys: apex-state-

      - name: Build landing page
        run: python scripts/build_landing.py

      - name: Commit updated landing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landing/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update landing page stats"
            git push
          fi
